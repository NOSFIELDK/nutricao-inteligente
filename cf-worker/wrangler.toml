name = "leifnutri-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"
# Fixar o account_id evita a consulta /memberships, que falha com
# API tokens sem permissão Memberships:Read (erro de auth 10000 no CI).
account_id = "e706f01211f4b32d4def7694b09ce5dd"

[vars]
MEALDB_BASE = "https://www.themealdb.com/api/json/v1/1"
FDC_BASE = "https://api.nal.usda.gov/fdc/v1"
CORS_ORIGINS = "https://nosfieldk.github.io,http://localhost:5173"

[[kv_namespaces]]
binding = "NUTRI_KV"
id = "13948453571142b1b323012f0f13c341"

[[d1_databases]]
binding = "DB"
database_name = "nutricao-inteligente"
database_id = "d1dd4a49-7601-41e3-b718-79792fd4a42c"

[ai]
binding = "AI"

name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "cf-worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cf-worker/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: cf-worker

      # Migrations são idempotentes (CREATE ... IF NOT EXISTS); o 0002 tem
      # ALTER TABLE ADD COLUMN que falha se já aplicado — por isso
      # continue-on-error: uma migration já aplicada não deve quebrar o deploy.
      - name: Apply migrations (D1) 0001
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cf-worker
          command: d1 execute nutricao-inteligente --file=./migrations/0001_auth_sync.sql --remote

      - name: Apply migrations (D1) 0002
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cf-worker
          command: d1 execute nutricao-inteligente --file=./migrations/0002_oauth_email.sql --remote

      - name: Apply migrations (D1) 0003
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cf-worker
          command: d1 execute nutricao-inteligente --file=./migrations/0003_sync_items.sql --remote

      # Apenas secrets com valor real são enviados — wrangler-action falha
      # com valores vazios. Adicione GOOGLE_*/RESEND_*/USDA_* aqui quando
      # tiverem valores configurados.
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cf-worker
          command: deploy
          secrets: |
            APP_ORIGIN
            CORS_ORIGINS
        env:
          APP_ORIGIN: ${{ secrets.APP_ORIGIN }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}

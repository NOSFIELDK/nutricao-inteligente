name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "cf-worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cf-worker/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: cf-worker

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cf-worker
          command: deploy
          secrets: |
            USDA_API_KEY
        env:
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
